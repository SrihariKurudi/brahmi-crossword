<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ब्राह्मीपत्रिका - अक्षरकेलीसर्गः</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap" id="app">
    <section class="panel">
      <div class="title-row">
        <img
          src="../assets/sarasvata_logo.png"
          alt="Brahmi Magazine logo"
          class="title-logo"
          onerror="this.style.display='none';"
        />
        <h1>ब्राह्मीपत्रिका - अक्षरकेलीसर्गः</h1>
      </div>
      <p class="subtext">Words and clues are loaded from Google Sheets. Regenerate anytime for a new layout.</p>
      <div class="status" id="status">Loading terms from Google Sheet...</div>

      <table class="crossword" id="crossword-grid" aria-label="Crossword grid"></table>

      <div class="actions">
        <button id="check-btn">Check Answers</button>
        <button id="reveal-btn" class="secondary">Reveal Solution</button>
        <button id="regenerate-btn" class="ghost">Regenerate Puzzle</button>
        <a
          id="edit-sheet-btn"
          class="btn-link"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >Edit / Add Words</a>
      </div>
    </section>

    <aside class="panel clues">
      <div>
        <h2>ACROSS</h2>
        <ol id="across-list"></ol>
      </div>
      <div>
        <h2>DOWN</h2>
        <ol id="down-list"></ol>
      </div>
    </aside>
  </div>

  <script type="module">
    import { fetchSheetTerms, SHEET_EDIT_URL } from "./sheet_loader.js";
    import {
      generateCrossword,
      renderPuzzle,
      checkAnswers,
      revealAnswers,
      clearAnswers,
    } from "./crossword.js";

    const root = document.getElementById("app");
    const statusEl = document.getElementById("status");
    const checkBtn = document.getElementById("check-btn");
    const revealBtn = document.getElementById("reveal-btn");
    const regenerateBtn = document.getElementById("regenerate-btn");
    const editSheetBtn = document.getElementById("edit-sheet-btn");

    editSheetBtn.href = SHEET_EDIT_URL;

    let terms = [];
    let puzzle = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function regenerate() {
      if (!terms.length) {
        setStatus("No terms found in sheet.", true);
        return;
      }

      puzzle = generateCrossword(terms, 10);
      renderPuzzle(puzzle, root);
      setStatus(
        `Loaded ${puzzle.inputCount} terms. Placed ${puzzle.placedCount}. Click Regenerate Puzzle for a new layout.`
      );
    }

    async function init() {
      try {
        terms = await fetchSheetTerms();
        regenerate();
      } catch (error) {
        setStatus(`Failed to load sheet: ${error.message}`, true);
      }
    }

    checkBtn.addEventListener("click", () => {
      checkAnswers(root);
    });

    revealBtn.addEventListener("click", () => {
      revealAnswers(root);
    });

    regenerateBtn.addEventListener("click", () => {
      clearAnswers(root);
      regenerate();
    });

    init();
  </script>
</body>
</html>
