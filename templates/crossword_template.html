<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #f4efe4;
      --card: #fffdf8;
      --ink: #2b2216;
      --accent: #8b5e34;
      --grid: #3c3122;
      --ok: #c8f2c9;
      --bad: #f9c7c7;
    }

    body {
      margin: 0;
      font-family: "Noto Sans Devanagari", "Chandas", "Nirmala UI", sans-serif;
      background: radial-gradient(circle at top right, #f8f4ea, var(--bg));
      color: var(--ink);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    .panel {
      background: var(--card);
      border: 1px solid #dbcdb8;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(60, 49, 34, 0.08);
      padding: 16px;
    }

    h1, h2 {
      margin: 0 0 10px;
      font-weight: 700;
    }

    table.crossword {
      border-collapse: collapse;
      margin: 0 auto;
    }

    td.square, td.block {
      width: 38px;
      height: 38px;
      border: 1px solid var(--grid);
      position: relative;
    }

    td.square {
      background: #fff;
    }

    td.block {
      background: #111;
    }

    .num {
      position: absolute;
      top: 1px;
      left: 2px;
      font-size: 10px;
      color: #5a4631;
      z-index: 2;
      line-height: 1;
    }

    .cell-input {
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      text-align: center;
      font-size: 22px;
      background: transparent;
      color: #1b1712;
      padding: 8px 2px 2px;
      box-sizing: border-box;
      font-family: inherit;
    }

    .cell-input.correct {
      background: var(--ok);
    }

    .cell-input.incorrect {
      background: var(--bad);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    button.secondary {
      background: #5d6f56;
    }

    button.ghost {
      background: #77624f;
    }

    .clues {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    ol {
      margin: 0;
      padding-left: 22px;
    }

    li {
      margin-bottom: 7px;
      line-height: 1.3;
    }

    .answer-meta {
      color: #7a6854;
      font-size: 12px;
    }

    @media (max-width: 920px) {
      .wrap {
        grid-template-columns: 1fr;
      }
      td.square, td.block {
        width: 32px;
        height: 32px;
      }
      .cell-input {
        font-size: 19px;
      }
    }

    @media print {
      .actions {
        display: none;
      }
      body {
        background: white;
      }
      .panel {
        box-shadow: none;
        border-color: #999;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>{{TITLE}}</h1>
      <table class="crossword" id="crossword-grid">
        {{GRID_ROWS}}
      </table>

      <div class="actions">
        <button id="check-btn">Check Answers</button>
        <button id="reveal-btn" class="secondary">Reveal Solution</button>
        <button id="clear-btn" class="ghost">Clear Grid</button>
      </div>
    </section>

    <aside class="panel clues">
      <div>
        <h2>ACROSS</h2>
        <ol>
          {{ACROSS_CLUES}}
        </ol>
      </div>
      <div>
        <h2>DOWN</h2>
        <ol>
          {{DOWN_CLUES}}
        </ol>
      </div>
    </aside>
  </div>

  <script>
    (function () {
      const cells = Array.from(document.querySelectorAll('.cell-input'));

      function clean(s) {
        return (s || '').trim();
      }

      function clearMarks() {
        cells.forEach((cell) => {
          cell.classList.remove('correct');
          cell.classList.remove('incorrect');
        });
      }

      document.getElementById('check-btn').addEventListener('click', function () {
        clearMarks();
        cells.forEach((cell) => {
          const expected = clean(cell.dataset.solution);
          const actual = clean(cell.value);
          if (!actual) {
            return;
          }
          if (actual === expected) {
            cell.classList.add('correct');
          } else {
            cell.classList.add('incorrect');
          }
        });
      });

      document.getElementById('reveal-btn').addEventListener('click', function () {
        clearMarks();
        cells.forEach((cell) => {
          cell.value = cell.dataset.solution || '';
          cell.classList.add('correct');
        });
      });

      document.getElementById('clear-btn').addEventListener('click', function () {
        cells.forEach((cell) => {
          cell.value = '';
        });
        clearMarks();
      });
    })();
  </script>
</body>
</html>
